name: ScanFlow
description: A lightweight offline document scanner.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  go_router: ^16.0.0
  camera: ^0.11.2
  image: ^4.5.4
  image_cropper: ^8.0.2
  pdf: ^3.11.3
  printing: ^5.14.2
  share_plus: ^12.0.0
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  permission_handler: ^11.0.0
  flutter_image_compress: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true